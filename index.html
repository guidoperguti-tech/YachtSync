<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YachtSync OS — Live Global Aggregator</title>
    <style>
        :root { 
            --bg-canvas: #fafafa; 
            --navy-dark: #0a1128; 
            --border-fine: #1e293b; 
            --slate-gray: #475569; 
            --pure-white: #ffffff; 
            --mobile-orange: #ee5c00;
        }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background-color: var(--bg-canvas); color: var(--navy-dark); margin: 0; display: flex; height: 100vh; overflow: hidden; -webkit-font-smoothing: antialiased; }
        
        /* Sidebar Components */
        .sidebar { width: 250px; min-width: 250px; background: var(--navy-dark); padding: 32px 24px; display: flex; flex-direction: column; border-right: 1px solid var(--border-fine); box-sizing: border-box; }
        .sidebar-brand { font-family: "Didot", serif; font-size: 20px; color: var(--pure-white); padding-bottom: 24px; border-bottom: 1px solid #1e293b; margin-bottom: 24px; letter-spacing: 0.5px; }
        .nav-section-title { font-size: 11px; font-weight: 700; text-transform: uppercase; color: #64748b; letter-spacing: 1px; margin-top: 20px; margin-bottom: 8px; }
        .nav-link { display: block; padding: 10px 0; color: #94a3b8; text-decoration: none; font-size: 13px; text-transform: uppercase; cursor: pointer; transition: all 0.2s ease; }
        .nav-link:hover, .nav-link.active { color: var(--pure-white); transform: translateX(2px); }
        .sidebar-footer { margin-top: auto; border-top: 1px solid #1e293b; padding-top: 16px; font-size: 11px; color: #64748b; }
        
        /* Layout Structure */
        .app-container { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        .top-navbar { height: 70px; background: var(--pure-white); border-bottom: 1px solid #e2e8f0; display: flex; align-items: center; justify-content: space-between; padding: 0 40px; box-sizing: border-box; }
        .top-navbar h1 { font-family: "Didot", serif; font-size: 22px; margin: 0; }
        .navbar-controls { display: flex; align-items: center; gap: 24px; }
        .system-badge { font-size: 11px; font-weight: 600; text-transform: uppercase; color: var(--slate-gray); border-bottom: 1px solid #cbd5e1; padding-bottom: 2px; }
        .btn-corporate-auth { background: transparent; border: 1px solid var(--navy-dark); color: var(--navy-dark); padding: 8px 18px; font-size: 11px; text-transform: uppercase; cursor: pointer; }

        .workspace { flex: 1; padding: 40px; overflow-y: auto; box-sizing: border-box; }
        
        /* Schieb-Mechanik Filterleiste */
        .sourcing-wrapper { display: flex; gap: 32px; max-width: 1650px; position: relative; align-items: flex-start; }
        .search-filter-sidebar { width: 350px; min-width: 350px; background: var(--pure-white); border: 1px solid #e2e8f0; padding: 24px; box-sizing: border-box; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); opacity: 1; }
        .search-filter-sidebar.collapsed { width: 0px; min-width: 0px; padding: 0px; margin-left: -32px; border: none; opacity: 0; overflow: hidden; pointer-events: none; }
        
        .toggle-filter-btn { background: var(--navy-dark); color: white; border: none; padding: 12px 16px; font-size: 11px; text-transform: uppercase; cursor: pointer; margin-bottom: 20px; display: inline-block; font-weight: 600; }
        .toggle-filter-btn:hover { background: var(--slate-gray); }
        .filter-section-title { font-size: 11px; font-weight: 700; text-transform: uppercase; margin-top: 20px; margin-bottom: 10px; color: var(--navy-dark); border-bottom: 1px solid #f1f5f9; padding-bottom: 4px; letter-spacing: 0.5px; }
        
        .search-results-feed { flex: 1; display: flex; flex-direction: column; gap: 20px; }
        
        .form-group { margin-bottom: 12px; }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; width: 100%; box-sizing: border-box; }
        label { display: block; font-size: 10px; font-weight: 700; text-transform: uppercase; margin-bottom: 4px; color: var(--slate-gray); }
        input, select { width: 100%; padding: 10px; border: 1px solid #cbd5e1; background: var(--pure-white); font-size: 13px; box-sizing: border-box; }
        
        .btn-search-submit { background: var(--mobile-orange); color: var(--pure-white); border: none; padding: 16px 20px; font-size: 13px; font-weight: 700; text-transform: uppercase; cursor: pointer; width: 100%; margin-top: 24px; letter-spacing: 0.5px; transition: background 0.2s ease; }
        .btn-search-submit:hover { background: #d65200; }

        /* Ergebnis-Karten Design */
        .boat-result-card { display: flex; background: var(--pure-white); border: 1px solid #e2e8f0; position: relative; min-height: 220px; box-sizing: border-box; }
        .boat-image-frame { width: 280px; min-width: 280px; height: 220px; overflow: hidden; background: #e2e8f0; display: flex; align-items: center; justify-content: center; }
        .boat-image-frame img { width: 100%; height: 100%; object-fit: cover; display: block; }
        .boat-details-pane { flex: 1; padding: 24px; display: flex; flex-direction: column; justify-content: space-between; box-sizing: border-box; }
        .boat-title-line { font-size: 19px; font-weight: 700; margin: 0; color: var(--navy-dark); }
        .boat-meta-line { font-size: 13px; color: var(--slate-gray); margin-top: 4px; line-height: 1.4; }
        .boat-price-tag { font-size: 22px; font-weight: 800; color: var(--mobile-orange); margin: 0; }
        .platform-origin-badge { position: absolute; top: 16px; right: 16px; font-size: 10px; font-weight: 700; text-transform: uppercase; background: #f1f5f9; border: 1px solid #cbd5e1; padding: 4px 8px; color: var(--navy-dark); }
        
        .btn-view-details { border: 1px solid var(--navy-dark); background: transparent; padding: 8px 16px; font-size: 12px; text-transform: uppercase; cursor: pointer; display: inline-block; text-decoration: none; color: var(--navy-dark); font-weight: 600; text-align: center; width: fit-content; margin-top: 12px; }
        .btn-view-details:hover { background: var(--navy-dark); color: white; }
        .pagination-row { display: flex; gap: 8px; margin-top: 32px; justify-content: center; flex-wrap: wrap; }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="sidebar-brand">YACHTSYNC OS</div>
        <div class="nav-section-title">Handel & Flotte</div>
        <div class="nav-link active">🔍 Global Sourcing (Ankauf)</div>
        <div class="sidebar-footer">
            <div id="creatorTrigger" style="font-size: 10px; color: #475569; cursor: pointer;" onclick="openCreatorPrompt()">&copy; 2026 YachtSync OS</div>
        </div>
    </div>

    <div class="app-container">
        <div class="top-navbar">
            <h1 id="page-title">Live Sourcing Network</h1>
            <div class="navbar-controls">
                <div id="systemStatus" class="system-badge">System: Live Gateway connected</div>
                <button id="authBtn" class="btn-corporate-auth" onclick="openCreatorPrompt()">Broker Login</button>
            </div>
        </div>

        <div class="workspace">
            <div id="sourcing-view">
                <button class="toggle-filter-btn" onclick="toggleFilterDrawer()">Filterleiste ein-/ausblenden</button>
                <div class="sourcing-wrapper">
                    
                    <div class="search-filter-sidebar" id="filterSidebar">
                        <div style="font-size:12px; font-weight:700; text-transform:uppercase; margin-bottom:12px; color:var(--navy-dark);">Echtzeit Internet-Filter</div>
                        
                        <div class="form-group"><label>Marke / Werft</label><input type="text" id="srcBrand" value="Azimut"></div>
                        <div class="form-group"><label>Modellbezeichnung</label><input type="text" id="srcModel" placeholder="z.B. Grande"></div>
                        
                        <div class="filter-section-title">Preisspanne</div>
                        <div class="form-row"><input type="number" id="srcPriceMin" placeholder="von (€)"><input type="number" id="srcPriceMax" placeholder="bis (€)" value="2000000"></div>

                        <div class="filter-section-title">Baujahr & Länge</div>
                        <div class="form-row"><input type="number" id="srcYearMin" placeholder="Jahr von"><input type="number" id="srcLengthMin" placeholder="Länge von (m)"></div>

                        <button class="btn-search-submit" onclick="wachePrüfen(() => executeGlobalSearch(1))">Live-Marktplatz durchsuchen</button>
                    </div>

                    <div style="flex:1;">
                        <div class="search-results-feed" id="resultsFeed"></div>
                        <div class="pagination-row" id="paginationRow"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

<script>
let enterpriseLizenzAktiv = false;

window.addEventListener('DOMContentLoaded', () => { executeGlobalSearch(1); });
function toggleFilterDrawer() { document.getElementById('filterSidebar').classList.toggle('collapsed'); }

function openCreatorPrompt() {
    let masterKey = prompt("🔒 CREATOR ROUTER CORE\n\nEnter Master-Schlüssel:");
    if (masterKey === "YACHTSYNC-CREATOR-2026-GLOBAL") {
        enterpriseLizenzAktiv = true;
        document.getElementById('authBtn').innerText = "Creator Workstation";
        document.getElementById('systemStatus').innerText = "Access Level: Live Router [Root]";
        executeGlobalSearch(1);
    }
}

function wachePrüfen(aktion) { if (enterpriseLizenzAktiv) { aktion(); } else { openCreatorPrompt(); } }

async function executeGlobalSearch(p) {
    const feed = document.getElementById('resultsFeed');
    feed.innerHTML = `<div style="text-align:center; padding:40px; font-style:italic;">Frage globale Live-Schnittstellen ab... Generiere Direkt-Sourcing-Links...</div>`;

    const payload = {
        brand: document.getElementById('srcBrand').value,
        model: document.getElementById('srcModel').value,
        priceMax: Number(document.getElementById('srcPriceMax').value) || Infinity,
        page: p
    };

    try {
        const res = await fetch('/api/sourcing/query', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(payload) });
        const daten = await res.json();
        feed.innerHTML = "";

        daten.listings.forEach(boot => {
            feed.innerHTML += `
                <div class="boat-result-card">
                    <div class="platform-origin-badge">${boot.plattform}</div>
                    <div class="boat-image-frame"><img src="${boot.bild}" alt="Yacht"></div>
                    <div class="boat-details-pane">
                        <div>
                            <h3 class="boat-title-line">${boot.hersteller} ${boot.modell}</h3>
                            <div class="boat-meta-line">Baujahr: ${boot.baujahr} | Länge: ${boot.laenge}m | Zustand: Live-Marktbestand</div>
                            <p style="font-size:13px; color:var(--slate-gray); margin-top:6px; margin-bottom:0; line-height:1.4;">${boot.text}<br><strong>Liegeplatz:</strong> ${boot.ort}</p>
                            <a href="${boot.link}" target="_blank" rel="noopener noreferrer" class="btn-view-details">➔ Inserat live auf ${boot.plattform} öffnen</a>
                        </div>
                        <h4 class="boat-price-tag">${boot.preis.toLocaleString('de-DE')} EUR</h4>
                    </div>
                </div>`;
        });
    } catch (e) { feed.innerHTML = `<div style="text-align:center; padding:40px; color:red;">Verbindungs-Fehler zum Live-Gateway.</div>`; }
}
</script>
</body>
</html>
